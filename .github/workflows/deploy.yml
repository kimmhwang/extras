name: Deploy to Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Generate Root Index
      run: |
        cat > index.html << EOF
        <!DOCTYPE html>
        <html>
        <head>
        <title>JSX Pages</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <script>hljs.highlightAll();</script>
        </head>
        <body style="font-family:sans-serif; max-width:1200px; margin:auto; padding:20px">
        <h1>JSX Files (Auto-generated)</h1>
        $(for f in *.jsx; do
          echo "<h2><a href=\"#\$f\">\$f</a> | <a href=\"https://raw.githubusercontent.com/${{ github.repository }}/main/\$f\" target=\"_blank\">raw</a></h2>
          <pre><code class=\"language-jsx\">$(cat "\$f" | sed 's/\\/\\\\/g; s/\"/\\\"/g')</code></pre><hr>";
        done)
        <p><small>Updated: $(date)</small></p>
        </body>
        </html>
        EOF
    - name: Setup Subdir Listings (optional)
      uses: gacts/directory-listing@v1
      with:
        target: .
    - uses: actions/upload-pages-artifact@v4
      with:
        path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - id: deployment
      uses: actions/deploy-pages@v4
